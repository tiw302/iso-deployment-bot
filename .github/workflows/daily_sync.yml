name: ISO Ultimate Library 100TB

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Up Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          docker-images: true

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Aria2 & Rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2
          curl https://rclone.org/install.sh | sudo bash

      - name: Setup Rclone
        env:
          MY_CONF: ${{ secrets.RCLONE_CONF_DATA }}
        run: |
          mkdir -p ~/.config/rclone
          printf "%s" "$MY_CONF" > ~/.config/rclone/rclone.conf

      - name: Run Massive Sync
        run: python3 sync_script.py
