# Updated at 2026-04-22

name: ISO Ultimate 100TB Library

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Runner Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          docker-images: true

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2
          curl https://rclone.org/install.sh | sudo bash

      - name: Setup Rclone Config
        shell: python
        env:
          CONF_BASE64: ${{ secrets.RCLONE_CONF_DATA }}
        run: |
          import os, base64
          conf_path = os.path.expanduser("~/.config/rclone/rclone.conf")
          os.makedirs(os.path.dirname(conf_path), exist_ok=True)
          
          raw_data = base64.b64decode(os.environ["CONF_BASE64"])
          
          with open(conf_path, "wb") as f:
              f.write(raw_data)
          
          print("Success: rclone.conf is ready!")
      - name: Run Mirror Script
        run: python3 sync_script.py
