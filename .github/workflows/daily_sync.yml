# Updated at 2026-04-22

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Runner Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          docker-images: true
          large-packages: true
          swap-storage: true

      - name: Check Disk Before
        run: df -h /

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2
          curl https://rclone.org/install.sh | sudo bash

      - name: Setup Rclone Config
        shell: python
        env:
          CONF_BASE64: ${{ secrets.RCLONE_CONF_DATA }}
        run: |
          import os, base64
          conf_path = os.path.expanduser("~/.config/rclone/rclone.conf")
          os.makedirs(os.path.dirname(conf_path), exist_ok=True)
          
          try:
              raw_data = base64.b64decode(os.environ["CONF_BASE64"])
              with open(conf_path, "wb") as f:
                  f.write(raw_data)
              print("[S] Success: rclone.conf restored!")
          except Exception as e:
              print(f"[x] Error: {e}")
              exit(1)

      - name: Run Mirror Script (Streaming Mode)
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python3 src/scripts/sync.py

      - name: Cleanup Temp
        if: always()
        run: |
          rm -rf /tmp/iso_sync_* 2>/dev/null || true
          df -h /

      - name: Discord Notification
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
