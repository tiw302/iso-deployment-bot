# Automated link health check — runs weekly and on-demand

name: Link Health Check

on:
  schedule:
    - cron: '0 0 * * 0'  # every sunday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Health & Update Checks
        id: check
        run: |
          PYTHONPATH=src python3 tools/check_links.py 2>&1 | tee link_check_output.txt
          PYTHONPATH=src python3 tools/check_updates.py -w 2>&1
          PYTHONPATH=src python3 tools/fetch_checksums.py 2>&1

          # Combine reports into broken_links.log if updates were found
          if [ -f updates_report.txt ]; then
            echo "" >> broken_links.log
            cat updates_report.txt >> broken_links.log
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

          BROKEN_COUNT=$(grep -oP 'broken: \K[0-9]+' link_check_output.txt || echo "0")
          echo "broken_count=$BROKEN_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$BROKEN_COUNT" -gt 0 ] || [ -f updates_report.txt ]; then
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & Push Database Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/os_deployment_library/distros.* 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No database changes to commit"
          else
            git commit -m "chore(auto): update distros database & checksums [skip ci]"
            git push
          fi

      - name: Create or Update Issue
        if: steps.check.outputs.has_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let reportBody = '⚠️ No detailed report file found.';
            try {
              reportBody = fs.readFileSync('broken_links.log', 'utf8');
            } catch (e) {
              console.log('broken_links.log not found, using fallback.');
            }

            const brokenCount = '${{ steps.check.outputs.broken_count }}';
            const hasUpdates = '${{ steps.check.outputs.has_updates }}';
            const today = new Date().toISOString().split('T')[0];

            // check for existing open issue to avoid duplicates
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'broken-link',
              state: 'open',
            });

            let title = `🔗 Health Check & Updates — ${today}`;
            let issueBody = `## Automated Health Check & Update Report\n\n`;
            if (parseInt(brokenCount) > 0) {
              issueBody += `⚠️ **${brokenCount} broken link(s)** were found in \`src/os_deployment_library/distros.json\`.\n`;
            }
            if (hasUpdates === 'true') {
              issueBody += `⚡ **New upstream OS versions** were detected!\n`;
            }
            issueBody += `\n### Report details:\n\n\`\`\`\n${reportBody}\n\`\`\`\n\n---\n*This issue was created automatically by the [Link Health Check](.github/workflows/link_health.yml) workflow.*`;

            if (existingIssues.data.length > 0) {
              // update the existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues.data[0].number,
                body: `## 🔄 Updated Report — ${today}\n\n${issueBody}`,
              });
            } else {
              // create a new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: issueBody,
                labels: ['broken-link', 'automated'],
              });
            }

      - name: Discord Notification
        if: steps.check.outputs.has_issues == 'true'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "⚠️ Broken Links / OS Updates Detected"
          description: "Weekly health check found broken links or new upstream OS versions in distros.json. Please review the GitHub Issue."
          color: 0xe74c3c
