# Automated link health check — runs weekly and on-demand

name: Link Health Check

on:
  schedule:
    - cron: '0 0 * * 0'  # every Sunday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Link Checker
        id: check
        run: |
          python3 tools/check_links.py 2>&1 | tee link_check_output.txt
          # capture exit status from check_links.py (it exits 0 even with broken links)
          if grep -q "broken:" link_check_output.txt; then
            BROKEN_COUNT=$(grep -oP 'broken: \K[0-9]+' link_check_output.txt || echo "0")
            echo "broken_count=$BROKEN_COUNT" >> "$GITHUB_OUTPUT"
            echo "has_broken=true" >> "$GITHUB_OUTPUT"
          else
            echo "broken_count=0" >> "$GITHUB_OUTPUT"
            echo "has_broken=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Issue for Broken Links
        if: steps.check.outputs.has_broken == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // read broken_links.log if it exists
            let reportBody = '⚠️ No detailed report file found.';
            try {
              reportBody = fs.readFileSync('broken_links.log', 'utf8');
            } catch (e) {
              console.log('broken_links.log not found, using fallback.');
            }
            
            const brokenCount = '${{ steps.check.outputs.broken_count }}';
            const today = new Date().toISOString().split('T')[0];
            
            // check for existing open issue to avoid duplicates
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'broken-link',
              state: 'open',
            });
            
            if (existingIssues.data.length > 0) {
              // update the existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues.data[0].number,
                body: `## 🔄 Updated Report — ${today}\n\n**${brokenCount} broken link(s) detected.**\n\n\`\`\`\n${reportBody}\n\`\`\``,
              });
            } else {
              // create a new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔗 Broken Links Detected — ${today}`,
                body: `## Automated Link Health Check\n\n**${brokenCount} broken link(s)** were found in \`src/distros.py\`.\n\nPlease review and update or remove the affected entries.\n\n### Report\n\n\`\`\`\n${reportBody}\n\`\`\`\n\n---\n*This issue was created automatically by the [Link Health Check](.github/workflows/link_health.yml) workflow.*`,
                labels: ['broken-link', 'automated'],
              });
            }

      - name: Discord Notification (broken links)
        if: steps.check.outputs.has_broken == 'true'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "⚠️ Broken Links Detected"
          description: "${{ steps.check.outputs.broken_count }} broken link(s) found in distros.py"
          color: 0xe74c3c
