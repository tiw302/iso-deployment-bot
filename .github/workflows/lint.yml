name: syntax-check

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compile Python Files
        run: |
          python3 -m py_compile src/distros.py src/scripts/*.py tools/*.py tests/*.py
          echo "syntax check passed: all python files are valid."

      - name: Run Ruff Linter
        run: |
          pip install ruff
          ruff check .

      - name: Run Unit Tests
        run: |
          python3 -m unittest discover -s tests -p "test_*.py"
          echo "all unit tests passed successfully."
          